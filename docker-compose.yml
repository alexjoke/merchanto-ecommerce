services:
  postgres:
    image: postgres:16-alpine
    container_name: merchanto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: merchanto
      POSTGRES_USER: merchanto
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U merchanto -d merchanto"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: merchanto-app
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      APP_NAME: Merchanto
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: merchanto
      DB_USERNAME: merchanto
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  vendor_data:
